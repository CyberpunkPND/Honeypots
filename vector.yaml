sources:
  docker_logs:
    type: docker_logs
  dionaea_json:
    type: file
    include:
      - /var/log/honeypots/dionaea/dionaea.json
    read_from: beginning

sinks:
  loki:
    type: loki
    inputs: ["docker_logs", "dionaea_json"]
    endpoint: http://loki:3100
    encoding:
      codec: json
    labels:
      container_name: "{{ container_name }}"
