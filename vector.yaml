sources:
  docker_logs:
    type: docker_logs
    docker_host: unix:///var/run/docker.sock

sinks:
  loki:
    type: loki
    inputs: ["docker_logs"]
    endpoint: http://loki:3100
    encoding:
      codec: json   # это про формат отправки в Loki, не про парсинг логов
    labels:
      container_name: "{{ container_name }}"
      job: docker
